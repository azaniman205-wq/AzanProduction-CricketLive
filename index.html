<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azan Production Cricket Live Score</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/images/logo.png" alt="Azan Production Logo" class="logo">
  <h1>Azan Production – Cricket Live Score</h1>
</header>

<section id="liveMatchesSection">
  <h2>Live Matches</h2>
  <div id="liveMatches">Loading matches...</div>
</section>

<section id="scorecardSection">
  <h2>Scorecard</h2>
  <div id="scorecard">Select a match above to view scorecard</div>
</section>

<section id="videoHighlightsSection">
  <h2>Free Cricket Highlights</h2>
  <video controls>
    <source src="assets/video/highlight1.mp4" type="video/mp4">
  </video>
  <video controls>
    <source src="assets/video/highlight2.mp4" type="video/mp4">
  </video>
</section>

<section id="audioSection">
  <h2>Commentary & Crowd Sounds</h2>
  <audio controls autoplay loop>
    <source src="assets/audio/commentary.mp3" type="audio/mpeg">
  </audio>
  <audio controls autoplay loop>
    <source src="assets/audio/crowd.mp3" type="audio/mpeg">
  </audio>
</section>

<script src="script.js"></script>
</body>
</html>
